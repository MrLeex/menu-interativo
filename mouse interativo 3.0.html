<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>@devemanuelangelo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Rubik:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #000000;
            padding: 0;
            margin: 0;
            overflow: hidden;
            /* Evita seleções acidentais de texto ao tocar na tela */
            user-select: none; 
            -webkit-user-select: none;
        }

        canvas {
            /* Essencial para Mobile: Bloqueia o "puxar para atualizar" e o scroll nativo */
            touch-action: none; 
            display: block;
        }

        /* --- Posicionamento Padrão (Telas Maiores) --- */
        #source-link { top: 120px; left: 20px; }
        #source-link > i { color: rgb(94, 106, 210); }

        #yt-link { top: 65px; left: 20px; }
        #yt-link > i { color: rgb(219, 31, 106); }

        .meta-link {
            align-items: center;
            backdrop-filter: blur(3px);
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            display: inline-flex;
            gap: 8px;
            padding: 10px 20px;
            position: fixed;
            text-decoration: none;
            transition: background-color 600ms, border-color 600ms;
            z-index: 10000;
        }

        .meta-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .meta-link > i,
        .meta-link > span {
            height: 20px;
            line-height: 20px;
        }

        .meta-link > span {
            color: white;
            font-family: "Rubik", sans-serif;
            transition: color 600ms;
        }

        .roboto-mono {
            font-family: "Roboto Mono", monospace !important;
        }

        /* --- Adaptação Responsiva para Celulares --- */
        @media (max-width: 768px) {
            .meta-link {
                padding: 8px 16px;
                font-size: 14px; /* Letra um pouco menor */
            }
            
            /* Movemos os links para a parte de BAIXO da tela no celular */
            #yt-link {
                top: auto;
                bottom: 70px;
                left: 50%;
                transform: translateX(-50%); /* Centraliza perfeitamente */
                width: max-content;
            }

            #source-link {
                top: auto;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%); /* Centraliza perfeitamente */
                width: max-content;
            }
        }
    </style>
</head>
<body>
    <canvas id='world'></canvas>

    <a id="source-link" class="meta-link" href="https://guns.lol/aleeqx" target="_blank">
        <i class="fas fa-link"></i>
        <span class="roboto-mono">Meu guns para infos</span>
    </a>

    <a id="yt-link" class="meta-link" href="https://www.youtube.com" target="_blank">
        <i class="fab fa-youtube"></i>
        <span>canal youtube</span>
    </a>

    <script>
        let SCREEN_WIDTH = window.innerWidth;
        let SCREEN_HEIGHT = window.innerHeight;

        const RADIUS = 70;
        let RADIUS_SCALE = 1;
        const RADIUS_SCALE_MIN = 1;
        const RADIUS_SCALE_MAX = 1.5;
        const QUANTITY = 25;

        let canvas;
        let context;
        let particles = [];

        let mouseX = SCREEN_WIDTH * 0.5;
        let mouseY = SCREEN_HEIGHT * 0.5;
        let mouseIsDown = false;

        function init() {
            canvas = document.getElementById('world');

            if (canvas && canvas.getContext) {
                context = canvas.getContext('2d');

                // Eventos de Mouse (Computador)
                window.addEventListener('mousemove', documentMouseMoveHandler, false);
                window.addEventListener('mousedown', documentMouseDownHandler, false);
                window.addEventListener('mouseup', documentMouseUpHandler, false);
                
                // Eventos de Toque (Celular)
                document.addEventListener('touchstart', documentTouchStartHandler, {passive: false});
                document.addEventListener('touchmove', documentTouchMoveHandler, {passive: false});
                document.addEventListener('touchend', documentTouchEndHandler, false); // NOVO: Detecta quando tira o dedo

                window.addEventListener('resize', windowResizeHandler, false);

                createParticles();
                windowResizeHandler();
                loop(); 
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < QUANTITY; i++) {
                const baseSpeed = 0.01 + Math.random() * 0.04;
                const baseOrbit = RADIUS * 0.5 + (RADIUS * 0.5 * Math.random());

                const particle = {
                    size: 1,
                    position: { x: mouseX, y: mouseY },
                    offset: { x: 0, y: 0 },
                    shift: { x: mouseX, y: mouseY },
                    speed: baseSpeed,
                    baseSpeed: baseSpeed, 
                    targetSize: 1,
                    fillColor: '#' + (Math.random() * 0x404040 + 0xaaaaaa | 0).toString(16),
                    orbit: baseOrbit,
                    baseOrbit: baseOrbit 
                };
                particles.push(particle);
            }
        }

        function burstEffect() {
            const colors = ['#00ffff', '#ff00ff', '#ffff00', '#ff5722', '#00ff00']; 
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].fillColor = colors[Math.floor(Math.random() * colors.length)];
                particles[i].speed = particles[i].baseSpeed * 5; 
                particles[i].orbit = particles[i].baseOrbit * 2;
            }
        }

        function documentMouseMoveHandler(event) {
            mouseX = event.clientX - (window.innerWidth - SCREEN_WIDTH) * .5;
            mouseY = event.clientY - (window.innerHeight - SCREEN_HEIGHT) * .5;
        }

        function documentMouseDownHandler() {
            mouseIsDown = true;
            burstEffect(); 
        }

        function documentMouseUpHandler() {
            mouseIsDown = false;
        }

        // Detecta o início do toque na tela
        function documentTouchStartHandler(event) {
            if (event.touches.length === 1) {
                event.preventDefault(); // Impede o navegador de dar zoom ou rolar
                mouseX = event.touches[0].pageX - (window.innerWidth - SCREEN_WIDTH) * .5;
                mouseY = event.touches[0].pageY - (window.innerHeight - SCREEN_HEIGHT) * .5;
                mouseIsDown = true;
                burstEffect(); 
            }
        }

        // Detecta quando arrasta o dedo
        function documentTouchMoveHandler(event) {
            if (event.touches.length === 1) {
                event.preventDefault();
                mouseX = event.touches[0].pageX - (window.innerWidth - SCREEN_WIDTH) * .5;
                mouseY = event.touches[0].pageY - (window.innerHeight - SCREEN_HEIGHT) * .5;
            }
        }

        // NOVO: Detecta quando tira o dedo da tela
        function documentTouchEndHandler(event) {
            mouseIsDown = false;
        }

        function windowResizeHandler() {
            SCREEN_WIDTH = window.innerWidth;
            SCREEN_HEIGHT = window.innerHeight;
            canvas.width = SCREEN_WIDTH;
            canvas.height = SCREEN_HEIGHT;
        }

        function loop() {
            if (mouseIsDown) {
                RADIUS_SCALE += (RADIUS_SCALE_MAX - RADIUS_SCALE) * (0.02);
            } else {
                RADIUS_SCALE -= (RADIUS_SCALE - RADIUS_SCALE_MIN) * (0.02);
            }

            RADIUS_SCALE = Math.min(RADIUS_SCALE, RADIUS_SCALE_MAX);

            context.fillStyle = 'rgba(0,0,0,0.05)';
            context.fillRect(0, 0, context.canvas.width, context.canvas.height);

            for (let i = 0; i < particles.length; i++) {
                const particle = particles[i];
                const lp = { x: particle.position.x, y: particle.position.y };

                particle.speed += (particle.baseSpeed - particle.speed) * 0.05;
                particle.orbit += (particle.baseOrbit - particle.orbit) * 0.05;

                particle.offset.x += particle.speed;
                particle.offset.y += particle.speed;

                particle.shift.x += (mouseX - particle.shift.x) * (particle.speed);
                particle.shift.y += (mouseY - particle.shift.y) * (particle.speed);

                particle.position.x = particle.shift.x + Math.cos(i + particle.offset.x) * (particle.orbit * RADIUS_SCALE);
                particle.position.y = particle.shift.y + Math.sin(i + particle.offset.y) * (particle.orbit * RADIUS_SCALE);

                particle.position.x = Math.max(Math.min(particle.position.x, SCREEN_WIDTH), 0);
                particle.position.y = Math.max(Math.min(particle.position.y, SCREEN_HEIGHT), 0);

                particle.size += (particle.targetSize - particle.size) * 0.05;

                if (Math.round(particle.size) === Math.round(particle.targetSize)) {
                    particle.targetSize = 1 + Math.random() * 7;
                }

                context.beginPath();
                context.fillStyle = particle.fillColor;
                context.strokeStyle = particle.fillColor;
                context.lineWidth = particle.size;
                context.moveTo(lp.x, lp.y);
                context.lineTo(particle.position.x, particle.position.y);
                context.stroke();
                context.arc(particle.position.x, particle.position.y, particle.size / 2, 0, Math.PI * 2, true);
                context.fill();
            }

            requestAnimationFrame(loop);
        }

        window.onload = init;
    </script>
</body>
</html>
